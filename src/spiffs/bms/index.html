<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BMS Dashboard</title>
  <link rel="stylesheet" href="/bms/css/style.css">
</head>
<body>
  <div class="container">
    <h1>BMS Dashboard</h1>
    
    <div class="info-box">
      <strong>Welcome!</strong> View current configuration or navigate to data visualization and settings.
    </div>

    <h2>Current Configuration</h2>
    
    <div id="loadingMsg" class="loading">Loading configuration...</div>
    
    <table id="cfgTable" style="display:none;">
      <thead>
        <tr>
          <th style="width: 50%;">Parameter</th>
          <th style="width: 50%;">Value</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    
    <div class="btn-group">
      <button class="btn-primary" onclick="location.href='/bms/stats'">
        📊 View Statistics
      </button>
      <button class="btn-success" onclick="location.href='/bms/config'">
        ⚙️ Configure System
      </button>
      <button id="led-btn" class="btn-danger" onclick="toggleLED()" style="min-width: 150px;">
        💡 LED: OFF
      </button>
    </div>
  </div>
  
  <script>
    function addRow(tbody, name, value) {
      const tr = document.createElement('tr');
      const tdName = document.createElement('td');
      const tdValue = document.createElement('td');
      
      tdName.textContent = name;
      tdValue.innerHTML = value;
      
      tr.appendChild(tdName);
      tr.appendChild(tdValue);
      tbody.appendChild(tr);
    }

    function fmt2(x) {
      if (x === undefined || x === null || x === '') return '';
      return Number(x).toFixed(2);
    }

    async function loadCfg() {
      const tbody = document.querySelector('#cfgTable tbody');
      const loadingMsg = document.getElementById('loadingMsg');
      const table = document.getElementById('cfgTable');
      
      tbody.innerHTML = '';

      try {
        const r = await fetch('/bms/config/data');
        if (!r.ok) throw new Error('Failed to fetch');
        
        const j = await r.json();

        addRow(tbody, 'WiFi SSID', `<strong>${j?.wifi?.ssid ?? 'Not configured'}</strong>`);
        addRow(tbody, 'WiFi Password', '••••••••');
        
        const staticIp = j?.wifi?.static_ip;
        if (staticIp && staticIp.length > 0) {
          addRow(tbody, 'IP Mode', '<strong>Static IP</strong>');
          addRow(tbody, 'IP Address', staticIp);
          addRow(tbody, 'Gateway', j?.wifi?.gateway ?? 'Not set');
          addRow(tbody, 'Netmask', j?.wifi?.netmask ?? 'Not set');
        } else {
          addRow(tbody, 'IP Mode', '<strong>DHCP</strong>');
        }
        addRow(tbody, 'MQTT Broker URI', j?.mqtt?.uri ?? 'Not configured');
        const adapter = j?.battery?.adapter ?? 'ltc6804';
        addRow(tbody, 'BMS Adapter', adapter === 'demo'
          ? '<strong style="color:orange;">Demo (random data)</strong>'
          : '<strong style="color:green;">LTC6804 (hardware)</strong>');
        addRow(tbody, 'Number of Cells', `<strong>${j?.battery?.num_cells ?? 5}</strong>`);
        addRow(tbody, 'Current Measurement', j?.battery?.current_enable !== false
          ? '<strong style="color:green;">Enabled</strong>'
          : '<strong style="color:gray;">Disabled</strong>');
        addRow(tbody, 'Cell Voltage Min', `${fmt2(j?.battery?.cell_v_min)} <span class="value-unit">V</span>`);
        addRow(tbody, 'Cell Voltage Max', `${fmt2(j?.battery?.cell_v_max)} <span class="value-unit">V</span>`);
        addRow(tbody, 'Pack Voltage Min', `${fmt2(j?.battery?.pack_v_min)} <span class="value-unit">V</span>`);
        addRow(tbody, 'Pack Voltage Max', `${fmt2(j?.battery?.pack_v_max)} <span class="value-unit">V</span>`);
        if (j?.battery?.current_enable !== false) {
          addRow(tbody, 'Current Min', `${fmt2(j?.battery?.series_pack_i_min)} <span class="value-unit">A</span>`);
          addRow(tbody, 'Current Max', `${fmt2(j?.battery?.series_pack_i_max)} <span class="value-unit">A</span>`);
        }

        loadingMsg.style.display = 'none';
        table.style.display = 'table';
        
      } catch (err) {
        loadingMsg.innerHTML = '<div class="error"><strong>Error:</strong> Failed to load configuration.</div>';
        console.error('Error loading config:', err);
      }
    }

    loadCfg();
    
    // LED Control
    let ledState = false;

    function updateLEDDisplay() {
      const btnEl = document.getElementById('led-btn');
      if (ledState) {
        // LED is ON - button should be GREEN
        btnEl.textContent = '💡 LED: ON';
        btnEl.className = 'btn-success';
      } else {
        // LED is OFF - button should be RED
        btnEl.textContent = '💡 LED: OFF';
        btnEl.className = 'btn-danger';
      }
    }

    async function toggleLED() {
      const endpoint = ledState ? '/bms/led/off' : '/bms/led/on';
      const btnEl = document.getElementById('led-btn');
      btnEl.disabled = true;
      
      try {
        const response = await fetch(endpoint, { method: 'POST' });
        const data = await response.json();
        ledState = (data.status === 'on');
        updateLEDDisplay();
      } catch (error) {
        console.error('Error toggling LED:', error);
        alert('Failed to toggle LED');
      } finally {
        btnEl.disabled = false;
      }
    }

    async function getLEDStatus() {
      try {
        const response = await fetch('/bms/led/status');
        const data = await response.json();
        ledState = (data.status === 'on');
        updateLEDDisplay();
      } catch (error) {
        console.error('Error getting LED status:', error);
      }
    }

    // Get LED status on page load
    getLEDStatus();
  </script>
</body>
</html>
