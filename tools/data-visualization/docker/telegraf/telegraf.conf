[agent]
  interval = "10s"
  flush_interval = "10s"


[[inputs.mqtt_consumer]]
  servers     = ["tcp://mosquitto:1883"]
  topics      = ["bms/esp32/stats"]
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "device_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "timestamp"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "sample_count"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "cell_errors"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pack_v_avg"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pack_i_avg"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.0"
      rename = "cell_v_avg_0"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.1"
      rename = "cell_v_avg_1"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.2"
      rename = "cell_v_avg_2"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.3"
      rename = "cell_v_avg_3"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.4"
      rename = "cell_v_avg_4"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.5"
      rename = "cell_v_avg_5"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.6"
      rename = "cell_v_avg_6"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.7"
      rename = "cell_v_avg_7"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.8"
      rename = "cell_v_avg_8"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.9"
      rename = "cell_v_avg_9"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.10"
      rename = "cell_v_avg_10"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "cell_v_avg.11"
      rename = "cell_v_avg_11"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "config.cell_v_min"
      rename = "config_cell_v_min"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "config.cell_v_max"
      rename = "config_cell_v_max"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "config.current_min"
      rename = "config_current_min"
    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "config.current_max"
      rename = "config_current_max"

    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.sw_version"
      rename   = "telemetry_sw_version"
      type     = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.cpu_load"
      rename   = "telemetry_cpu_load"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.free_heap"
      rename   = "telemetry_free_heap"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.min_heap"
      rename   = "telemetry_min_heap"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.reset_reason"
      rename   = "telemetry_reset_reason"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.ltc_soc"
      rename   = "telemetry_ltc_soc"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.ltc_itmp"
      rename   = "telemetry_ltc_itmp"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.ltc_va"
      rename   = "telemetry_ltc_va"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.ltc_vd"
      rename   = "telemetry_ltc_vd"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.ltc_cell_flags"
      rename   = "telemetry_ltc_cell_flags"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "telemetry.ltc_diag"
      rename   = "telemetry_ltc_diag"
      optional = true


[[outputs.influxdb_v2]]
  urls         = ["http://influxdb2:8086"]
  token        = "${INFLUX_TOKEN}"
  organization = "bms"
  bucket       = "bms"
